[phases.setup]
nixPkgs = ['python311', 'postgresql']

[phases.install]
cmds = [
    'python -m venv /opt/venv',
    '. /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt'
]

[phases.build]
cmds = [
    '. /opt/venv/bin/activate && python manage.py collectstatic --noinput'
]

[start]
# Staging: 1 worker, 1 thread — lower resource footprint
cmd = '. /opt/venv/bin/activate && python manage.py migrate --noinput && python manage.py seed_plans && python manage.py seed_sources && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --worker-class gthread --threads 2 --timeout 120 --access-logfile - --error-logfile - --log-level debug'
