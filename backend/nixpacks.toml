[phases.setup]
nixPkgs = ['python311', 'postgresql']

[phases.install]
cmds = [
    'python -m venv /opt/venv',
    '. /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt'
]

[phases.build]
cmds = [
    '. /opt/venv/bin/activate && python manage.py collectstatic --noinput'
]

[start]
cmd = '. /opt/venv/bin/activate && python manage.py migrate --noinput && python manage.py seed_plans && python manage.py seed_sources && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --worker-class gthread --threads 2 --worker-connections 1000 --timeout 120 --keep-alive 5 --max-requests 1000 --max-requests-jitter 100 --access-logfile - --error-logfile - --log-level info'
